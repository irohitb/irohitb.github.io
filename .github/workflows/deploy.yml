name: deploy

# Build the Astro site and publish it to GitHub Pages (user site
# https://irohitb.github.io). Runs on every push to main, on demand, and is
# also re-triggered when the health/github workflows commit refreshed YAML.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Turns on GitHub Pages with "GitHub Actions" as the source on first run,
      # so you don't have to flip it in Settings → Pages by hand.
      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Build straight from the committed YAML. Data generation lives in the
      # health/github workflows, so we don't re-run the generators here.
      - run: npx astro build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
