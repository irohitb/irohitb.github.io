name: deploy

# Build the Astro site and publish it to GitHub Pages (custom domain
# rohitbhatia.com). Runs on every push to main, on demand, and hourly on a
# schedule. The scheduled run regenerates the live data (GitHub contributions)
# at build time, so the site self-refreshes without any cross-workflow trigger.

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 * * * *" # hourly (UTC) — refresh GitHub contributions
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Turns on GitHub Pages with "GitHub Actions" as the source on first run,
      # so you don't have to flip it in Settings → Pages by hand.
      - uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # `npm run build` regenerates github.yml (token-free public API) + health
      # (keeps committed values if no export present), then runs astro build —
      # so every deploy, including the hourly scheduled one, ships fresh data.
      - run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
