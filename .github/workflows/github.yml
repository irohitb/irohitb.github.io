name: github-contributions

# Refresh src/data/github.yml from the GitHub GraphQL API and commit it, so the
# site's contribution count stays current — same "update the YAML" model as the
# health workflow. Runs hourly and on demand. Each commit here triggers the
# deploy workflow, so the live site refreshes within the hour.

on:
  schedule:
    - cron: "0 * * * *" # every hour, on the hour (UTC)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: github-contributions
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Regenerate github.yml
        # No token needed — uses a public contributions API.
        run: npm run build:github

      - name: Commit refreshed github.yml
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- src/data/github.yml; then
            echo "github.yml unchanged — nothing to commit"
          else
            git add src/data/github.yml
            git commit -m "chore(github): refresh contribution count"
            git push
          fi
