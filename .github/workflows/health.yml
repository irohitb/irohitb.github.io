name: health

# Regenerate src/data/health.yml from an Apple Health export.
#
# Trigger: push a new/updated export into data/health-export/, or run the
# workflow manually. The job parses the export, commits the refreshed
# health.yml, and (on push to the default branch) the deploy can follow.

on:
  push:
    paths:
      - "data/health-export/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: health-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Native export comes as export.zip — unzip any zips in place so the
      # parser sees export.xml. No-op for Health Auto Export JSON.
      - name: Unzip any native exports
        run: |
          shopt -s nullglob
          for z in data/health-export/*.zip; do
            echo "Unzipping $z"
            unzip -o "$z" -d data/health-export/
          done

      - name: Regenerate health.yml
        run: npm run build:health

      - name: Commit refreshed health.yml
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- src/data/health.yml; then
            echo "health.yml unchanged — nothing to commit"
          else
            git add src/data/health.yml
            git commit -m "chore(health): refresh from Apple Health export"
            git push
          fi

      # Sanity-check that the site still builds with the new data.
      - name: Build site
        run: npm run build
